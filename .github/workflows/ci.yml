name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Build VINAN
        run: dotnet build Vinan.sln --configuration Release

      - name: Test VINAN
        run: dotnet test Vinan.sln --configuration Release --no-build
